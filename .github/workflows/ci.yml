name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Pytest
        run: pytest -q || echo "no tests yet"

  docker:
    needs: test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set short sha
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: registry.oxa.gg
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            registry.oxa.gg/tsd-bot:sha-${{ steps.vars.outputs.sha }}
            registry.oxa.gg/tsd-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-infra:
    needs: docker
    runs-on: ubuntu-latest
    env:
      SHORT_SHA: ${{ format('{0}', github.sha) }}
    steps:
      - name: Checkout infra
        uses: actions/checkout@v4
        with:
          repository: top-servers-discord/infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Bump image tag
        working-directory: infra
        run: |
          NEW_TAG="${SHORT_SHA:0:7}"
          sed -i "s|tsd-bot:.*|tsd-bot:sha-${NEW_TAG}|" base/bot/statefulset.yaml
          git config user.name "tsd-bot"
          git config user.email "bot@top-servers-discord.local"
          git add base/bot/statefulset.yaml
          git commit -m "chore(bot): bump image to sha-${NEW_TAG}" || echo "no changes"
          git push
